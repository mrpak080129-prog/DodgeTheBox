<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dodge Game Web</title>
  <style>
    canvas { background: black; display: block; margin: 0 auto; }
    body { text-align: center; font-family: Arial; color: white; user-select: none; }
    .controls { display: flex; justify-content: center; margin-top: 10px; }
    .button {
      width: 80px; height: 50px; margin: 0 20px;
      background: #555; color: white; font-size: 20px; border-radius: 10px;
      display: flex; justify-content: center; align-items: center;
      touch-action: none;
      user-select: none;
    }
    .button:active { background: #888; }
  </style>
</head>
<body>
  <h1>Dodge Game (Web)</h1>
  <canvas id="gameCanvas" width="500" height="500"></canvas>
  <div class="controls">
    <div class="button" id="leftBtn">◀</div>
    <div class="button" id="rightBtn">▶</div>
  </div>
  <p>Use buttons or keyboard (LEFT/RIGHT, A/D). Press R to restart.</p>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const player = { x: 200, y: 400, width: 20, height: 20, speed: 3 };
    const enemyCount = 10;
    const enemySize = 35;
    const enemies = [];
    let score = 0;
    let highScore = localStorage.getItem('highScore') || 0;
    highScore = parseInt(highScore);
    let gameOver = false;
    const enemySpeed = 4;

    const keys = { left: false, right: false };
    
    // 버튼 이벤트
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');

    leftBtn.addEventListener('touchstart', e => { keys.left = true; e.preventDefault(); });
    leftBtn.addEventListener('touchend', e => { keys.left = false; e.preventDefault(); });

    rightBtn.addEventListener('touchstart', e => { keys.right = true; e.preventDefault(); });
    rightBtn.addEventListener('touchend', e => { keys.right = false; e.preventDefault(); });

    // 장애물 초기화
    for (let i = 0; i < enemyCount; i++) {
      enemies.push({ x: Math.random() * (canvas.width - enemySize), y: Math.random() * -500 });
    }

    // 키보드 이벤트
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
      if (e.key === 'r' || e.key === 'R') { if(gameOver) restartGame(); }
    });
    document.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    });

    function restartGame() {
      gameOver = false;
      score = 0;
      player.x = 200;
      enemies.forEach(e => { e.x = Math.random() * (canvas.width - enemySize); e.y = Math.random() * -500; });
    }

    function drawPlayer() {
      ctx.fillStyle = '#bfbfbf';
      ctx.beginPath();
      ctx.arc(player.x + player.width/2, player.y + player.height/2, player.width/2, 0, Math.PI*2);
      ctx.fill();
    }

    function drawEnemies() {
      enemies.forEach(e => {
        ctx.fillStyle = '#ffe696';
        ctx.fillRect(e.x, e.y, enemySize, enemySize);
        ctx.strokeStyle = '#c8b400';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(e.x + enemySize/2, e.y);
        ctx.lineTo(e.x + enemySize/2, e.y + enemySize);
        ctx.stroke();
      });
    }

    function drawScore() {
      ctx.fillStyle = 'white';
      ctx.font = '20px Arial';
      ctx.fillText('Score: ' + score, 20, 30);
      ctx.fillText('High Score: ' + highScore, canvas.width - 160, 30);
    }

    function drawGameOver() {
      ctx.fillStyle = 'red';
      ctx.font = '40px Arial';
      ctx.fillText('GAME OVER', 120, 230);
      ctx.font = '20px Arial';
      ctx.fillStyle = 'white';
      ctx.fillText('Press R to Restart', 160, 270);
    }

    function update() {
      if (!gameOver) {
        score++;
        if (keys.left && player.x > 0) player.x -= player.speed;
        if (keys.right && player.x + player.width < canvas.width) player.x += player.speed;

        enemies.forEach(e => {
          e.y += enemySpeed;
          if(e.y > canvas.height) { e.y = 0; e.x = Math.random() * (canvas.width - enemySize); }
          if(player.x < e.x + enemySize &&
             player.x + player.width > e.x &&
             player.y < e.y + enemySize &&
             player.y + player.height > e.y) {
            gameOver = true;
            if(score > highScore) { highScore = score; localStorage.setItem('highScore', highScore); }
          }
        });
      }
    }

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drawPlayer();
      drawEnemies();
      drawScore();
      if(gameOver) drawGameOver();
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
